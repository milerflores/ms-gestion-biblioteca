server:
  servlet:
    context-path: /api/v1
  port: 8070

spring:
  application:
    name: ms-biblioteca
  datasource:
    url: jdbc:postgresql://localhost:5432/BD_GESTION_BIBLIOTECA?currentSchema=bd_biblioteca
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      minimum-idle: 3
      max-lifetime: 180000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false


